<!DOCTYPE html>
<html>
<head><title>.</title></head>
<body>
<script>
  const params  = new URLSearchParams(window.location.search);
  const source  = params.get("source")  || "unknown";
  const tool    = params.get("tool")    || "unknown";
  const purpose = params.get("purpose") || "unknown";
  const ua      = navigator.userAgent;
  const time    = new Date().toISOString();

  fetch("https://ntfy.sh/ram-linkedin-bot-scans19", {
    method: "POST",
    body: `🤖 Profile Scanned!\nSource: ${source}\nTool: ${tool}\nPurpose: ${purpose}\nTime: ${time}\nUser-Agent: ${ua}`,
    headers: {
      "Title": "LinkedIn Bot Detected",
      "Priority": "high",
      "Tags": "robot"
    }
  });
</script>
<p> </p>
</body>
</html>
