<!DOCTYPE html>
<html>
<head><title>Profile Scan Detected</title></head>
<body>
<script>
  const params = new URLSearchParams(window.location.search);
  const source = params.get("source") || "unknown";
  const ua = navigator.userAgent;
  const time = new Date().toISOString();

  fetch("https://ntfy.sh/ram-linkedin-bot-scans19", {
    method: "POST",
    body: `🤖 Scan detected!\nSource: ${source}\nTime: ${time}\nAgent: ${ua}`,
    headers: { "Title": "LinkedIn Profile Scanned" }
  });
</script>
<p>Nothing to see here.</p>
</body>
</html>
